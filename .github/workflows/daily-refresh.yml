name: Daily Deal Refresh

on:
  schedule:
    # 11:00 UTC daily (~6-7am US Eastern). GitHub may delay scheduled runs
    # by several minutes under load — this is expected.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Prevent overlapping runs.
concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write   # needed to push the regenerated files

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Regenerate deals.json (fails closed on bad data)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}   # optional repo variable; falls back to script default
        run: npm run refresh

      - name: Rebuild index.html from deals.json
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name "dailybite-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deals.json index.html
          if git diff --cached --quiet; then
            echo "No deal changes today."
          else
            git commit -m "chore: daily deal refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
